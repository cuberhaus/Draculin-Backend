services:
  backend:
    build: .
    ports:
      - "8889:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=Draculin.settings
      # Sentry deliberately absent on this branch (`obs-experiment-embrace`).
      # The Flutter client is the sole observability source via Embrace SaaS.
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ../Draculin-Front
      network: host
    ports:
      - "8890:80"
    depends_on:
      - backend
